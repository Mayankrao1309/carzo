<body>

                    </svg>
                </div>
                <span style="color:var(--color-black);">Carzo</span>
            </a>
            <nav class="navbar__links" id="nav-links">

                <a href="cars.html" class="navbar__link">All Cars</a>
                <a href="list-car.html" class="navbar__link">List Your Car</a>
                <a href="locations.html" class="navbar__link">Near by locations</a>
                <a href="about.html" class="navbar__link">About US</a>

            </nav>
            <div class="navbar__actions">
                <div class="navbar__auth" id="navbar-auth">
                    <a href="login.html" class="btn-auth btn-auth--login" style="background: rgba(0, 0, 0, 0.05); font-weight: 600;">Log In</a>
                    <a href="signup.html" class="btn-auth btn-auth--signup">Sign Up</a>
                </div>
                <div class="navbar__profile-dropdown" id="profile-dropdown" style="display: none;">
                    <button class="navbar__profile-btn" id="profile-btn" aria-label="Profile Menu">

                    <div class="navbar__profile-menu" id="profile-menu">

                            <span class="navbar__profile-email" id="navbar-profile-email">mayan@example.com</span>
                        </div>
                        <div class="navbar__profile-divider"></div>
                        <a href="dashboard.html" class="navbar__profile-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="7" height="9" x="3" y="3" rx="1"/>
                                <rect width="7" height="5" x="14" y="3" rx="1"/>
                                <rect width="7" height="9" x="14" y="12" rx="1"/>
                                <rect width="7" height="5" x="3" y="16" rx="1"/>
                            </svg>

                        <a href="profile.html" class="navbar__profile-item">

                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>

                        </a>
                        <a href="booking-management.html" class="navbar__profile-item">

                <button class="navbar__icon-btn navbar__hamburger" id="hamburger" aria-label="Menu">

    </header>

    <!-- ===================== LOGIN CARD ===================== -->
    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="auth-logo-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
                            <path d="M2 12h20" />
                        </svg>
                    </div>
                    <span>Carzo</span>
                </div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-desc">Log in to manage your premium car rentals</p>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group" style="text-align: left; margin-bottom: 20px;">
                    <label class="form-label" for="login-email">Email Address</label>
                    <input type="email" id="login-email" class="form-input" placeholder="name@example.com" required value="mayan@example.com">
                </div>

                <div class="form-group" style="text-align: left; margin-bottom: 24px;">
                    <label class="form-label" for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••" required value="password123">
                </div>

                <button type="submit" class="btn-confirm" style="width: 100%; justify-content: center; background: var(--color-primary); box-shadow: 0 4px 14px rgba(235, 103, 14, 0.35);">
                    Log In
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 6px;">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                </button>
            </form>

            <p class="auth-footer-text">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </p>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            
            // Check if user already signed up with different info in LocalStorage
            let userProfile = JSON.parse(localStorage.getItem('Carzo_user_profile'));
            
            if (!userProfile || userProfile.email !== email) {
                // Generate a default profile for Mayan or the typed user if none exists
                userProfile = {
                    name: "Mayan Sharma",
                    email: email,
                    phone: "+91 98765 43210",
                    avatar: ""
                };
            }
            
            localStorage.setItem('Carzo_user_profile', JSON.stringify(userProfile));
            localStorage.setItem('Carzo_logged_in', 'true');

            // Handle adding/updating customer in Carzo_customers
            let customers = JSON.parse(localStorage.getItem('Carzo_customers')) || [];
            let existingCust = customers.find(c => c.email.toLowerCase() === email.toLowerCase());

            const now = new Date();
            const day = now.getDate();
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const month = monthNames[now.getMonth()];
            const year = now.getFullYear();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            const timeStr = `${String(hours).padStart(2, '0')}:${minutes} ${ampm}`;
            const loginDateStr = `${day} ${month} ${year}, ${timeStr}`;

            if (!existingCust) {
                customers.push({
                    name: userProfile.name,
                    email: userProfile.email,
                    phone: userProfile.phone,
                    location: "Pune",
                    recentLogin: loginDateStr
                });
                localStorage.setItem('Carzo_customers', JSON.stringify(customers));
            } else if (!existingCust.recentLogin || existingCust.recentLogin === 'First Login') {
                existingCust.recentLogin = loginDateStr;
                localStorage.setItem('Carzo_customers', JSON.stringify(customers));
            }

            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
